name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Build
        env:
          NEXT_PUBLIC_BASE_PATH: /forecast-dashboard
        run: npm run build
      - name: Prepare docs folder
        run: |
          rm -rf docs
          mv out docs
          touch docs/.nojekyll
      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "chore: update built site in docs/"
          git push
